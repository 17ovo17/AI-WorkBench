workflow:
  name: log_analysis
  description: 日志分析工作流 — 采集日志 → 正则提取错误 → 知识检索 → LLM 分析根因
  version: "1.0.0"

  nodes:
    - id: start
      type: start
      title: 接收日志分析请求
      inputs:
        hostname: ""
        time_range: "1h"
        log_source: "syslog"
      next: http_fetch_logs

    - id: http_fetch_logs
      type: http_request
      title: 获取日志数据
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/aiops/logs?hostname={{start.hostname}}&source={{start.log_source}}&range={{start.time_range}}"
        timeout: 15000
      fallback:
        on_error: continue
        fallback_value: '{"logs":[],"error":"log_fetch_failed"}'
      next: code_parse_errors

    - id: code_parse_errors
      type: code
      title: 提取错误日志并统计
      config:
        language: javascript
        code: |
          function main(inputs) {
            const logs = inputs.http_fetch_logs_response || '[]';
            const lines = typeof logs === 'string' ? logs.split('\n') : [];
            const errorPattern = /\b(ERROR|FATAL|Exception|panic|CRITICAL|OOM|segfault)\b/i;
            const errorLines = [];
            const frequency = {};

            for (const line of lines) {
              const match = line.match(errorPattern);
              if (match) {
                const keyword = match[1].toUpperCase();
                frequency[keyword] = (frequency[keyword] || 0) + 1;
                if (errorLines.length < 100) {
                  errorLines.push(line.trim());
                }
              }
            }

            const topErrors = Object.entries(frequency)
              .sort((a, b) => b[1] - a[1])
              .map(([keyword, count]) => ({ keyword, count }));

            return {
              total_lines: lines.length,
              error_count: errorLines.length,
              top_errors: topErrors,
              sample_errors: errorLines.slice(0, 20)
            };
          }
      fallback:
        on_error: continue
        fallback_value: '{"total_lines":0,"error_count":0,"top_errors":[],"sample_errors":[]}'
      next: knowledge_retrieval

    - id: knowledge_retrieval
      type: knowledge_retrieval
      title: 检索相似案例
      config:
        query: "{{start.hostname}} {{code_parse_errors.top_errors}}"
        top_k: 5
        score_threshold: 0.2
      fallback:
        on_error: continue
        fallback_value: "[]"
      next: llm_analyze

    - id: llm_analyze
      type: llm
      title: LLM 日志分析
      config:
        system_prompt: |
          你是资深运维工程师，擅长日志分析和故障排查。
          请分析提供的错误日志，识别错误模式和根因。
          输出 JSON 格式：
          {"error_patterns":[{"pattern":"模式描述","count":N,"severity":"high/medium/low","likely_cause":"可能原因"}],"root_cause":"根因分析","recommendations":["建议1","建议2"],"summary":"一句话总结"}
        user_prompt: |
          ## 分析请求
          主机: {{start.hostname}}
          时间范围: {{start.time_range}}
          日志来源: {{start.log_source}}

          ## 错误统计
          {{code_parse_errors.top_errors}}

          ## 错误样本
          {{code_parse_errors.sample_errors}}

          ## 历史相似案例
          {{knowledge_retrieval.results}}

          请基于以上数据进行日志分析，严格按 JSON 格式输出。
        temperature: 0.1
        max_tokens: 2000
        json_mode: true
      fallback:
        on_error: continue
        fallback_value: '{"error_patterns":[],"root_cause":"分析失败","recommendations":[],"summary":"LLM 分析不可用"}'
      next: end

    - id: end
      type: end
      title: 输出分析报告
      outputs:
        report: "{{llm_analyze.result}}"
        hostname: "{{start.hostname}}"
        log_source: "{{start.log_source}}"
        error_count: "{{code_parse_errors.error_count}}"

  global:
    error_handling: continue_on_failure
    timeout: 120000
    node_timeout: 30000
    retry:
      max_attempts: 1
      backoff: 2000

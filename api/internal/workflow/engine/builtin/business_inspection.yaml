workflow:
  name: business_inspection
  description: 业务巡检工作流 — 获取业务拓扑 → 循环采集每台主机指标 → LLM 综合评估
  version: "1.0.0"

  nodes:
    - id: start
      type: start
      title: 接收巡检请求
      inputs:
        business_id: ""
        business_name: ""
      next: http_topology

    - id: http_topology
      type: http_request
      title: 获取业务拓扑
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/topology/businesses/{{start.business_id}}"
        timeout: 10000
      next: http_batch_metrics

    - id: http_batch_metrics
      type: http_request
      title: 获取主机列表与指标
      parallel_group: metrics_collect
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/prometheus/hosts"
        timeout: 30000
      fallback:
        on_error: continue
        fallback_value: '{"hosts":[]}'
      next: knowledge_retrieval

    - id: http_alerts
      type: http_request
      title: 查询业务相关告警
      parallel_group: metrics_collect
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/alerts?status=firing&limit=50"
        timeout: 5000
      fallback:
        on_error: continue
        fallback_value: '{"items":[]}'
      next: knowledge_retrieval

    - id: knowledge_retrieval
      type: knowledge_retrieval
      title: 检索相关案例
      config:
        query: "{{start.business_name}} 巡检"
        top_k: 5
        score_threshold: 0.2
      fallback:
        on_error: continue
        fallback_value: "[]"
      next: llm_summary

    - id: llm_summary
      type: llm
      title: LLM 综合评估
      config:
        system_prompt: |
          你是资深运维工程师，正在对一个业务系统进行巡检评估。
          请只基于输入中的真实拓扑、Prometheus 主机指标、当前告警和历史案例生成 Markdown 巡检报告，不要输出 JSON。
          报告必须包含：
          1. 业务健康总览表（业务、主机数、健康/告警/严重数量、总体评分、总体状态）。
          2. 每台主机一行的指标表格，至少包含主机、CPU、内存、磁盘、网络/错误、状态、证据。
          3. 异常汇总表，包含主机、异常指标、当前值、阈值或判断依据、严重级别。
          4. 处置建议，区分立即止血、后续优化、需要补充的数据。
          如果某项数据缺失，请在表格中写“数据缺失”，不得编造指标值。
        user_prompt: |
          ## 业务信息
          业务名称: {{start.business_name}}
          业务 ID: {{start.business_id}}

          ## 拓扑结构
          {{http_topology.response}}

          ## 各主机指标数据
          {{http_batch_metrics.response}}

          ## 当前告警
          {{http_alerts.response}}

          ## 历史相关案例
          {{knowledge_retrieval.results}}
        temperature: 0.05
        max_tokens: 3000
        json_mode: false
      next: end

    - id: end
      type: end
      title: 输出巡检报告
      outputs:
        report: "{{llm_summary.result}}"
        business_id: "{{start.business_id}}"
        business_name: "{{start.business_name}}"

  global:
    error_handling: continue_on_failure
    timeout: 180000
    node_timeout: 120000
    retry:
      max_attempts: 1
      backoff: 2000

workflow:
  name: alert_diagnosis
  description: 告警驱动自动诊断 — 接收告警 → 检索案例 → 采集指标 → LLM 分析 → 匹配 Runbook
  version: "1.0.0"

  nodes:
    - id: start
      type: start
      title: 接收告警信息
      inputs:
        alert_id: ""
        alert_title: ""
        target_ip: ""
        severity: ""
      next: http_alert_detail

    - id: http_alert_detail
      type: http_request
      title: 获取告警详情
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/alerts/{{start.alert_id}}"
        timeout: 5000
      fallback:
        on_error: continue
        fallback_value: "{}"
      next: knowledge_retrieval

    - id: knowledge_retrieval
      type: knowledge_retrieval
      title: 检索相似案例
      config:
        query: "{{start.alert_title}} {{start.target_ip}}"
        top_k: 3
        score_threshold: 0.3
      fallback:
        on_error: continue
        fallback_value: "[]"
      next: http_metrics

    - id: http_metrics
      type: http_request
      title: 查询告警主机指标
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/prometheus/metrics?ip={{start.target_ip}}"
        timeout: 15000
      fallback:
        on_error: continue
        fallback_value: '{"metrics":{}}'
      next: llm_diagnosis

    - id: llm_diagnosis
      type: llm
      title: LLM 告警根因分析
      config:
        system_prompt: |
          你是资深运维工程师，正在处理一条告警。请基于告警信息、实时指标和历史案例分析根因。
          输出严格 JSON 格式：
          {"root_cause":"根因描述","root_cause_category":"分类","evidence":[{"metric":"指标名","current_value":"值","threshold":"阈值","status":"critical/warning/normal"}],"treatment":["步骤1","步骤2"],"confidence":"HIGH/MEDIUM/LOW","recommended_runbook_category":"分类名"}
        user_prompt: |
          ## 告警信息
          标题: {{start.alert_title}}
          主机: {{start.target_ip}}
          严重级别: {{start.severity}}
          详情: {{http_alert_detail.response}}

          ## 实时指标
          {{http_metrics.response}}

          ## 历史相似案例
          {{knowledge_retrieval.results}}
        temperature: 0.1
        max_tokens: 2000
        json_mode: true
      next: runbook_match

    - id: runbook_match
      type: http_request
      title: 匹配推荐 Runbook
      config:
        method: GET
        url: "http://127.0.0.1:8080/api/v1/knowledge/runbooks?category={{llm_diagnosis.recommended_runbook_category}}&limit=3"
        timeout: 5000
      fallback:
        on_error: continue
        fallback_value: '{"items":[]}'
      next: end

    - id: end
      type: end
      title: 输出诊断结果
      outputs:
        diagnosis: "{{llm_diagnosis.result}}"
        recommended_runbooks: "{{runbook_match.response}}"
        alert_id: "{{start.alert_id}}"

  global:
    error_handling: continue_on_failure
    timeout: 90000
    retry:
      max_attempts: 1
      backoff: 2000

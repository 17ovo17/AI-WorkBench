workflow:
  name: capacity_forecast
  description: 容量预测工作流 — 查询历史趋势 → JS 线性回归 → LLM 预测分析
  version: "1.0.0"

  nodes:
    - id: start
      type: start
      title: 接收预测请求
      inputs:
        hostname: ""
        forecast_days: "30"
        metrics_focus: "disk_used_percent,mem_used_percent,cpu_usage_active"
      next: http_range_query

    - id: http_range_query
      type: http_request
      title: 查询历史趋势数据
      config:
        method: POST
        url: "http://127.0.0.1:8080/api/v1/aiops/data/prometheus/range"
        headers:
          Content-Type: application/json
        body:
          hostname: "{{start.hostname}}"
          time_range: "30d"
          metrics: "{{start.metrics_focus}}"
          step: "1h"
        timeout: 30000
      fallback:
        on_error: stop
      next: code_trend_calc

    - id: code_trend_calc
      type: code
      title: 线性回归趋势计算
      config:
        language: javascript
        timeout: 10000
        code: |
          var data = inputs.metrics || {};
          var forecastDays = parseInt(inputs.forecast_days) || 30;
          var results = {};
          var keys = Object.keys(data);
          for (var k = 0; k < keys.length; k++) {
            var metric = keys[k];
            var series = data[metric];
            if (!series || !series.length || series.length < 2) continue;
            var n = series.length;
            var sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            for (var i = 0; i < n; i++) {
              var x = i;
              var y = parseFloat(series[i].value) || 0;
              sumX += x; sumY += y; sumXY += x * y; sumX2 += x * x;
            }
            var slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            var intercept = (sumY - slope * sumX) / n;
            var currentVal = parseFloat(series[n - 1].value) || 0;
            var dailyChange = slope * 24;
            var forecastVal = currentVal + dailyChange * forecastDays;
            var daysTo80 = -1, daysTo90 = -1, daysTo95 = -1;
            if (dailyChange > 0) {
              if (currentVal < 80) daysTo80 = Math.ceil((80 - currentVal) / dailyChange);
              if (currentVal < 90) daysTo90 = Math.ceil((90 - currentVal) / dailyChange);
              if (currentVal < 95) daysTo95 = Math.ceil((95 - currentVal) / dailyChange);
            }
            results[metric] = {
              current: Math.round(currentVal * 100) / 100,
              slope_per_hour: Math.round(slope * 10000) / 10000,
              daily_change: Math.round(dailyChange * 100) / 100,
              forecast_value: Math.round(forecastVal * 100) / 100,
              forecast_days: forecastDays,
              trend: dailyChange > 0.1 ? 'increasing' : (dailyChange < -0.1 ? 'decreasing' : 'stable'),
              days_to_80: daysTo80,
              days_to_90: daysTo90,
              days_to_95: daysTo95,
              data_points: n
            };
          }
          outputs = {trends: results, metric_count: keys.length};
      inputs:
        metrics: "{{http_range_query.response}}"
        forecast_days: "{{start.forecast_days}}"
      next: llm_forecast

    - id: llm_forecast
      type: llm
      title: LLM 容量预测分析
      config:
        system_prompt: |
          你是容量规划专家。请基于线性回归趋势数据，给出容量预测和扩容建议。
          输出 JSON：
          {"summary":"总结","forecasts":[{"metric":"指标名","current":"当前值","trend":"趋势","forecast_30d":"30天后预测值","risk_level":"high/medium/low/safe","action":"建议操作","deadline":"预计达到阈值的日期"}],"urgent_actions":["紧急操作"],"planning_recommendations":["规划建议"]}
        user_prompt: |
          ## 主机: {{start.hostname}}
          ## 预测周期: {{start.forecast_days}} 天

          ## 趋势分析结果
          {{code_trend_calc.trends}}
        temperature: 0.1
        max_tokens: 2000
        json_mode: true
      next: end

    - id: end
      type: end
      title: 输出预测报告
      outputs:
        forecast: "{{llm_forecast.result}}"
        trends: "{{code_trend_calc.trends}}"
        hostname: "{{start.hostname}}"

  global:
    error_handling: stop_on_failure
    timeout: 120000
    retry:
      max_attempts: 1
      backoff: 2000
